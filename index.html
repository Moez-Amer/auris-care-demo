<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AurisLite</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; }
        button { background: #03dac6; padding: 12px 24px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
        #log { margin-top: 30px; text-align: left; background: #2d2d2d; height: 250px; overflow-y: auto; padding: 15px; font-family: monospace; }
        .result { color: #ffb74d; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>aurisLite</h1>
    <button id="startBtn">Start Listening</button>
    <div id="log"></div>
</div>
<script>
    const startBtn = document.getElementById('startBtn');
    const logDiv = document.getElementById('log');
    let socket, audioContext, processor, globalStream;

    function log(msg) {
        logDiv.innerHTML = `<div>> ${msg}</div>` + logDiv.innerHTML;
    }

    startBtn.addEventListener('click', async () => {
        if (audioContext) { stopListening(); return; }
        
        // APPLE SAFARI FIX: We must wake up the audio engine instantly on click!
        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        audioContext.resume(); 

        log("Requesting microphone...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            globalStream = stream;
            log("Microphone access granted.");
            
            const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
            const wsUrl = wsProtocol + window.location.host + "/ws";
            log("Connecting to backend...");
            
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                log("Connected to AI successfully!");
                startBtn.textContent = "Stop Listening";
                startBtn.style.background = "#cf6679";
                startAudioProcessing(stream);
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`Heard: <span class="result">${data.class}</span> (${data.confidence})`);
            };

            socket.onerror = (error) => {
                log("❌ ERROR: Safari blocked the background connection due to the self-signed certificate.");
            };
            
            socket.onclose = () => {
                log("Connection closed.");
                stopListening();
            }
        } catch (err) { log("Error: " + err.message); }
    });

    function startAudioProcessing(stream) {
        const source = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(processor);
        processor.connect(audioContext.destination);

        processor.onaudioprocess = (e) => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const inputData = e.inputBuffer.getChannelData(0);
                const int16Buffer = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    int16Buffer[i] = Math.min(1, Math.max(-1, inputData[i])) * 0x7FFF;
                }
                socket.send(int16Buffer.buffer);
            }
        };
    }

    function stopListening() {
        startBtn.textContent = "Start Listening";
        startBtn.style.background = "#03dac6";
        if (processor) processor.disconnect();
        if (audioContext) audioContext.close();
        if (globalStream) globalStream.getTracks().forEach(t => t.stop());
        if (socket) socket.close();
        audioContext = null;
    }

    function log(msg) {
        logDiv.innerHTML = `<div>> ${msg}</div>` + logDiv.innerHTML;
    }
</script>
</body>
</html>
